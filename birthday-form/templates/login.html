<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-animation"></div>
    <div class="container">
        <div class="form-wrapper glass">
            <header>
                <h1>Admin Login</h1>
                <p>Login to sync collected birthdays.</p>
            </header>
            
            {% if error %}
            <div class="status-message status-error" style="opacity: 1; margin-bottom: 15px;">{{ error }}</div>
            {% endif %}

            <form method="POST">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter username" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter password" required>
                </div>

                <button type="submit" class="submit-btn" style="margin-top: 10px;">
                    <span class="btn-text">Login</span>
                </button>
            </form>
        </div>
    </div>
</body>
</html>
